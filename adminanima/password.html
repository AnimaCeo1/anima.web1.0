<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ANIMA Админка · Пароль</title>
    <link rel="stylesheet" href="./admin.css?v=admin-ops-6" />
  </head>
  <body data-page="password">
    <main class="auth-screen">
      <section class="auth-card">
        <img class="auth-logo" src="../assets/anima-wordmark.png" alt="ANIMA" />
        <p class="auth-kicker">Шаг 2 / 2</p>
        <h1>Введите пароль</h1>
        <p class="auth-user" data-pending-user></p>
        <form class="auth-form" data-password-form>
          <label>
            Пароль
            <input name="password" type="password" autocomplete="current-password" placeholder="••••••••••••" required />
          </label>
          <button type="submit">Открыть админку</button>
          <a class="back-link" href="./">Вернуться к логину</a>
          <small data-auth-error aria-live="polite"></small>
        </form>
      </section>
    </main>

    <script src="../mock-data.js"></script>
    <script src="../services/database.js?v=shared-db-4"></script>
    <script src="./admin.js?v=admin-ops-6"></script>
  </body>
</html>
